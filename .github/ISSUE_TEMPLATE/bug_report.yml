name: Bug Report
description: Report a bug in the Edge Veda SDK
labels: ["bug"]
body:
  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      description: Edge Veda version from pubspec.yaml
      placeholder: "2.4.1"
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter Version
      description: Output of `flutter --version`
      placeholder: "Flutter 3.38.x"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - iOS
        - macOS
        - Android
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: Device model and OS version
      placeholder: "iPhone 15 Pro, iOS 18.2"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      description: Paste any relevant logs or error output
      render: shell
    validations:
      required: false
